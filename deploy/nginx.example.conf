# Example Nginx site for TN16 (SPA + Express API).
# Copy and adjust server_name, SSL paths, and upstream port (PM2/Express PORT).
#
# Common 405 cause: proxy_pass with a trailing slash strips /api from the URI.
# Express expects full paths like /api/auth/login — keep proxy_pass WITHOUT a URI path.
#
# BAD:  location /api/ { proxy_pass http://127.0.0.1:5000/; }  → upstream gets /auth/login (wrong)
# GOOD: location /api/ { proxy_pass http://127.0.0.1:5000; }   → upstream gets /api/auth/login (correct)

upstream tn16_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    server_name your-domain.com;

    root /var/www/tn16/dist;
    index index.html;

    # Do not add a dedicated "location = /login" for the API — /login is a frontend route only.

    location /api/ {
        proxy_pass http://tn16_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Do not use limit_except here — POST must reach Node.
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
